<!DOCTYPE html>
<html>
<head>
    <title>Drone Flight Demo - Aholo Viewer</title>
    <meta charset="UTF-8" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { background: #000; }
        #container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            font-family: sans-serif;
            z-index: 100;
            text-align: center;
            line-height: 1.6;
        }
        #loading a {
            color: #4a4aff;
            font-size: 14px;
        }
        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.55);
            padding: 8px 20px;
            border-radius: 6px;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="loading">
        Loading PLY splat data...<br/>
    </div>
    <div id="status"></div>
    <script type="module" src="./index.js"></script>
</body>
</html>
