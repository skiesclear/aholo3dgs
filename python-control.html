<!DOCTYPE html>
<html>
<head>
    <title>Python Drone Controller - Aholo Viewer</title>
    <meta charset="UTF-8" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { background: #000; font-family: sans-serif; }
        #container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 100;
            text-align: center;
            line-height: 1.6;
        }
        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.62);
            padding: 8px 14px;
            border-radius: 6px;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="loading">Loading Python-controlled scene...</div>
    <div id="status">controller: disconnected</div>
    <script type="module" src="./python-control.ts"></script>
</body>
</html>
